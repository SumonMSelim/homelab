---
# Create LXC containers on Proxmox VE (all entries in inventory/group_vars/all/lxc.yml → proxmox_containers).
# Run from a host that can reach the Proxmox API.
# Bind mounts are applied in a second play on the Proxmox host (API token cannot set bind mounts).
#
# Required: Proxmox API token + root password for new containers (see vars/README.md).
# With vars file: make create-lxc  (or -e "@vars/proxmox_create_vars.yml")
#
- name: Create LXC containers on Proxmox
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    proxmox_validate_certs: false
  roles:
    - proxmox_create_lxc
  tags:
    - lxc

- name: Add bind mounts on Proxmox host (root only; API token cannot set bind mounts)
  hosts: proxmox_host
  gather_facts: false
  vars_files:
    - ../roles/proxmox_create_lxc/defaults/main.yml
  tasks:
    # Unprivileged LXC: bind mount appears as nobody; container root maps to another UID.
    # Make media dirs world-writable so both can write (Radarr/Sonarr root folder).
    - name: Ensure media libraries parent exists and is writable on Proxmox host
      ansible.builtin.file:
        path: "{{ jellyfin_media_storage_host_path }}/libraries"
        state: directory
        mode: "0777"

    - name: Ensure media libraries subdirs exist and are writable on Proxmox host
      ansible.builtin.file:
        path: "{{ jellyfin_media_storage_host_path }}/libraries/{{ item }}"
        state: directory
        mode: "0777"
      loop:
        - downloads
        - movies
        - tv

    - name: Validate bind mount definitions
      ansible.builtin.assert:
        that:
          - item.1.id is defined
          - item.1.id is match('^mp[0-9]+$')
          - item.1.host_path is defined
          - item.1.mountpoint is defined
        fail_msg: "Each mount_volumes entry must define id, host_path, and mountpoint."
      loop: "{{ query('subelements', proxmox_containers, 'mount_volumes', {'skip_missing': true}) }}"
      loop_control:
        label: "{{ item.0.hostname }} {{ item.1.id | default('missing-id') }}"

    - name: Build bind mount entries
      ansible.builtin.set_fact:
        bind_mount_entries: "{{ (bind_mount_entries | default([])) + [{'vmid': item.0.vmid, 'hostname': item.0.hostname, 'id': item.1.id, 'pct_mount': item.1.host_path ~ ',mp=' ~ item.1.mountpoint, 'pct_config_line': item.1.id ~ ': ' ~ item.1.host_path ~ ',mp=' ~ item.1.mountpoint}] }}"
      loop: "{{ query('subelements', proxmox_containers, 'mount_volumes', {'skip_missing': true}) }}"
      loop_control:
        label: "{{ item.0.hostname }} {{ item.1.id }}"

    - name: Read current LXC config for bind mounts
      ansible.builtin.command: "pct config {{ item.vmid }}"
      loop: "{{ bind_mount_entries | default([]) }}"
      loop_control:
        label: "{{ item.hostname }} {{ item.id }}"
      register: pct_config_results
      changed_when: false

    - name: Determine bind mounts requiring changes
      ansible.builtin.set_fact:
        bind_mounts_to_apply: "{{ (bind_mounts_to_apply | default([])) + [item.item] }}"
      loop: "{{ pct_config_results.results | default([]) }}"
      loop_control:
        label: "{{ item.item.hostname }} {{ item.item.id }}"
      when: item.item.pct_config_line not in item.stdout_lines

    - name: Build bind mount restart list
      ansible.builtin.set_fact:
        bind_mount_vmids_to_check: "{{ bind_mounts_to_apply | default([]) | map(attribute='vmid') | unique | list }}"

    - name: Read status for containers with bind mount changes
      ansible.builtin.command: "pct status {{ item }}"
      loop: "{{ bind_mount_vmids_to_check | default([]) }}"
      register: pct_status_results
      changed_when: false

    - name: Stop running containers before bind mount changes
      ansible.builtin.command: "pct stop {{ item.item }}"
      loop: "{{ pct_status_results.results | default([]) }}"
      loop_control:
        label: "{{ item.item }}"
      when: "'status: running' in item.stdout"

    - name: Add or update bind mounts
      ansible.builtin.command: "pct set {{ item.vmid }} -{{ item.id }} {{ item.pct_mount }}"
      loop: "{{ bind_mounts_to_apply | default([]) }}"
      loop_control:
        label: "{{ item.hostname }} {{ item.id }}"

    - name: Start containers that were running before bind mount changes
      ansible.builtin.command: "pct start {{ item.item }}"
      loop: "{{ pct_status_results.results | default([]) }}"
      loop_control:
        label: "{{ item.item }}"
      when: "'status: running' in item.stdout"
  tags:
    - lxc
