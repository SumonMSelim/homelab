---
# Deploy Caddy (reverse proxy + Cloudflare Tunnel). Tinyauth runs on PocketID host — see deploy_pocketid.
# Secrets: Cloudflare API token + tunnel token from Vault (kv/homelab/data/caddy).
# Vars: -e "@vars/vault_auth_vars.yml"
- name: Deploy Caddy
  hosts: caddy_host
  become: yes
  roles:
    - caddy
