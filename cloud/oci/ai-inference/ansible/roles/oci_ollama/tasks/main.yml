---
- name: Check if Ollama binary exists
  ansible.builtin.stat:
    path: /usr/local/bin/ollama
  register: ollama_binary

- name: Ensure zstd is installed
  ansible.builtin.apt:
    name: zstd
    state: present
  when: not ollama_binary.stat.exists

- name: Download Ollama tarball
  ansible.builtin.get_url:
    url: "https://github.com/ollama/ollama/releases/download/{{ ollama_version }}/ollama-linux-arm64.tar.zst"
    dest: /tmp/ollama-linux-arm64.tar.zst
    mode: "0644"
  when: not ollama_binary.stat.exists

- name: Extract Ollama binary from tarball
  ansible.builtin.shell: |
    cd /tmp
    tar --use-compress-program=unzstd -xf ollama-linux-arm64.tar.zst bin/ollama
    mv /tmp/bin/ollama /usr/local/bin/ollama
    chmod +x /usr/local/bin/ollama
    rm -rf /tmp/bin /tmp/ollama-linux-arm64.tar.zst
  args:
    creates: /usr/local/bin/ollama
  when: not ollama_binary.stat.exists
  notify: restart ollama

- name: Ensure ollama user exists
  ansible.builtin.user:
    name: ollama
    system: true
    shell: /bin/false
    home: /var/lib/ollama
    create_home: true
  when: not ollama_binary.stat.exists

- name: Ensure ollama directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: ollama
    group: ollama
    mode: "0755"
  loop:
    - /var/lib/ollama/models
    - /etc/ollama
  when: not ollama_binary.stat.exists

- name: Deploy Ollama systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/ollama.service
    mode: "0644"
    content: |
      [Unit]
      Description=Ollama Service
      After=network-online.target
      Wants=network-online.target

      [Service]
      User=ollama
      Group=ollama
      EnvironmentFile=/etc/ollama/environment
      ExecStart=/usr/local/bin/ollama serve
      Restart=always
      RestartSec=3
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target
  when: not ollama_binary.stat.exists
  notify: restart ollama

- name: Configure Ollama environment
  ansible.builtin.copy:
    dest: /etc/ollama/environment
    owner: root
    group: ollama
    mode: "0640"
    content: |
      OLLAMA_HOST={{ ollama_host }}
      OLLAMA_MODELS=/var/lib/ollama/models
      OLLAMA_MAX_LOADED_MODELS={{ ollama_max_loaded_models }}
      OLLAMA_KEEP_ALIVE={{ ollama_keep_alive }}
      OLLAMA_NUM_PARALLEL={{ ollama_num_parallel }}
  notify: restart ollama

- name: Flush handlers before starting Ollama
  ansible.builtin.meta: flush_handlers

- name: Ensure Ollama is running
  ansible.builtin.systemd:
    name: ollama
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for Ollama API
  ansible.builtin.uri:
    url: http://127.0.0.1:11434/
    method: GET
  register: ollama_ready
  until: ollama_ready.status == 200
  retries: 12
  delay: 5

- name: Get currently loaded models
  ansible.builtin.uri:
    url: http://127.0.0.1:11434/api/ps
    method: GET
    return_content: true
  register: ollama_ps

- name: Unload all running models before switching
  ansible.builtin.uri:
    url: http://127.0.0.1:11434/api/generate
    method: POST
    body_format: json
    body:
      model: "{{ item.name }}"
      keep_alive: 0
  loop: "{{ (ollama_ps.content | from_json).models }}"
  when: (ollama_ps.content | from_json).models | length > 0

- name: Pull target model
  ansible.builtin.uri:
    url: http://127.0.0.1:11434/api/pull
    method: POST
    body_format: json
    body:
      model: "{{ ollama_model }}"
    timeout: 3600
  register: pull_result
  changed_when: false

- name: Get all local models
  ansible.builtin.uri:
    url: http://127.0.0.1:11434/api/tags
    method: GET
    return_content: true
  register: ollama_tags

- name: Remove models that are not the target
  ansible.builtin.uri:
    url: http://127.0.0.1:11434/api/delete
    method: DELETE
    body_format: json
    body:
      model: "{{ item.name }}"
  loop: "{{ (ollama_tags.content | from_json).models }}"
  when: item.name != ollama_model
