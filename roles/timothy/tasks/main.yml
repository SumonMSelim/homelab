---
- name: Read Timothy secrets from Vault
  community.hashi_vault.vault_read:
    url: "{{ vault_addr }}"
    path: "{{ timothy_vault_secret_path }}"
    auth_method: approle
    role_id: "{{ vault_role_id }}"
    secret_id: "{{ vault_secret_id }}"
  register: timothy_vault
  delegate_to: localhost
  become: false
  no_log: true

- name: Set Timothy secrets
  ansible.builtin.set_fact:
    hermes_api_server_key: "{{ timothy_vault.data.data.data.api_server_key }}"
    hermes_ollama_base_url: "{{ timothy_vault.data.data.data.ollama_base_url }}"
    hermes_telegram_bot_token: "{{ timothy_vault.data.data.data.telegram_bot_token }}"
  no_log: true

- name: Create Hermes data directory
  ansible.builtin.file:
    path: "{{ hermes_data_dir }}"
    state: directory
    mode: "0755"

- name: Create compose directory
  ansible.builtin.file:
    path: /opt/compose/timothy-{{ inventory_hostname }}
    state: directory
    mode: "0755"

- name: Deploy compose file
  ansible.builtin.template:
    src: compose.yml.j2
    dest: /opt/compose/timothy-{{ inventory_hostname }}/compose.yml
    mode: "0644"
  notify: restart timothy

- name: Pull Hermes image
  community.docker.docker_compose_v2_pull:
    project_src: /opt/compose/timothy-{{ inventory_hostname }}

- name: Start Timothy
  community.docker.docker_compose_v2:
    project_src: /opt/compose/timothy-{{ inventory_hostname }}
    state: present
    pull: always

- name: Wait for Hermes to initialize config
  ansible.builtin.wait_for:
    path: "{{ hermes_data_dir }}/config.yaml"
    timeout: 30

- name: Configure Hermes model provider
  ansible.builtin.command: >
    docker exec timothy-gateway-{{ inventory_hostname }}
    /opt/hermes/.venv/bin/hermes config set {{ item.key }} {{ item.value }}
  loop:
    - { key: "model.provider", value: "custom" }
    - { key: "model.default", value: "{{ hermes_model }}" }
    - { key: "model.base_url", value: "{{ hermes_ollama_base_url }}/v1" }
    - { key: "model.context_length", value: "65536" }
    - { key: "auxiliary.compression.context_length", value: "65536" }
    - { key: "TELEGRAM_BOT_TOKEN", value: "{{ hermes_telegram_bot_token }}" }
    - { key: "TELEGRAM_ALLOWED_USERS", value: "{{ hermes_telegram_allowed_users }}" }
  changed_when: false
  notify: restart timothy

- name: Fix config.yaml ownership so container user can read it
  ansible.builtin.file:
    path: "{{ hermes_data_dir }}/config.yaml"
    owner: "{{ hermes_uid }}"
    group: "{{ hermes_gid }}"
    mode: "0640"
  notify: restart timothy
