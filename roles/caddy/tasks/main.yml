---
# Caddy reverse proxy + Cloudflare Tunnel. Secrets fetched from Vault.
- name: Fetch Caddy secrets from Vault
  community.hashi_vault.vault_read:
    url: "{{ vault_addr }}"
    path: "{{ caddy_vault_secret_path }}"
    auth_method: approle
    role_id: "{{ vault_role_id }}"
    secret_id: "{{ vault_secret_id }}"
  register: caddy_vault_secret
  delegate_to: localhost
  become: false
  no_log: true

- name: Set Caddy secrets from Vault
  ansible.builtin.set_fact:
    cloudflare_api_token: "{{ caddy_vault_secret.data.data.data.cloudflare_api_token }}"
    cloudflare_tunnel_token: "{{ caddy_vault_secret.data.data.data.cloudflare_tunnel_token }}"
    caddy_cloudflare_email: "{{ caddy_vault_secret.data.data.data.caddy_cloudflare_email | default('') }}"
  no_log: true

- name: Ensure compose project directory exists
  ansible.builtin.file:
    path: "/opt/compose/caddy-{{ inventory_hostname }}"
    state: directory
    mode: '0755'

- name: Ensure Caddy config directory exists
  ansible.builtin.file:
    path: "/opt/compose/caddy-{{ inventory_hostname }}/config"
    state: directory
    mode: '0755'

- name: Deploy Caddy Dockerfile (build with Cloudflare DNS module)
  ansible.builtin.copy:
    src: Dockerfile
    dest: "/opt/compose/caddy-{{ inventory_hostname }}/Dockerfile"
    mode: '0644'

- name: Deploy Caddy compose file
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "/opt/compose/caddy-{{ inventory_hostname }}/compose.yml"
    mode: '0644'
  no_log: true
  notify: Restart Caddy service

- name: Deploy Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "/opt/compose/caddy-{{ inventory_hostname }}/config/Caddyfile"
    mode: '0644'
  notify: Restart Caddy service

- name: Start Caddy and Cloudflare Tunnel with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "/opt/compose/caddy-{{ inventory_hostname }}"
    state: present
    build: always
