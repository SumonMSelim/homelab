name: OCI Experiment — GPU Burst

# Ephemeral VM.GPU.A10.1 sessions for benchmarking.
# Cost: ~€1.90/hr. Max 24 sessions × 3 hr = €137 budget.
# Destroy always runs after benchmark — cannot be left running accidentally.
# Hard auto-destroy schedule also fires 2026-05-20 02:00 UTC.

on:
  workflow_dispatch:
    inputs:
      vllm_model:
        description: "HuggingFace model ID for vLLM"
        required: true
        default: "mistralai/Mistral-7B-Instruct-v0.3"
      action:
        description: "Action (run=deploy+benchmark+destroy, destroy=teardown only)"
        required: true
        default: run
        type: choice
        options: [run, destroy]
  schedule:
    - cron: "0 2 20 5 *"   # 2026-05-20 02:00 UTC hard destroy

permissions:
  contents: read

env:
  TF_VERSION: "1.15.1"
  TF_DIR: cloud/oci/experiment/terraform/envs/gpu-burst
  TF_BACKEND_KEY: "oci-exp-gpu/terraform.tfstate"
  TF_BACKEND_BUCKET: ${{ vars.OCI_STATE_BUCKET }}
  TF_BACKEND_REGION: ${{ vars.OCI_REGION }}
  TF_BACKEND_ENDPOINT: "https://${{ vars.OCI_STATE_NAMESPACE }}.compat.objectstorage.${{ vars.OCI_REGION }}.oraclecloud.com"

jobs:
  gpu-session:
    name: ${{ github.event_name == 'schedule' && 'Auto-destroy (trial end)' || format('GPU {0}', github.event.inputs.action) }}
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Write OCI key
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        env:
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: |
          terraform init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="key=${TF_BACKEND_KEY}" \
            -backend-config="region=${TF_BACKEND_REGION}" \
            -backend-config="endpoints={s3=\"${TF_BACKEND_ENDPOINT}\"}" \
            -backend-config="access_key=${{ secrets.OCI_STATE_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.OCI_STATE_SECRET_KEY }}" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="use_path_style=true" \
            -backend-config="skip_s3_checksum=true"

      - name: Terraform Apply (provision GPU)
        if: github.event_name != 'schedule' && github.event.inputs.action == 'run'
        working-directory: ${{ env.TF_DIR }}
        env: &tf_vars
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_content: ${{ secrets.OCI_PRIVATE_KEY_CONTENT }}
          TF_VAR_region: ${{ vars.OCI_REGION }}
          TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
          TF_VAR_availability_domain: ${{ vars.OCI_AVAILABILITY_DOMAIN }}
          TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY_OCI }}
          TF_VAR_vllm_model: ${{ github.event.inputs.vllm_model }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: |
          terraform plan -out=tfplan -input=false
          terraform apply -auto-approve -input=false tfplan

      - name: Wait for vLLM to be ready
        if: github.event_name != 'schedule' && github.event.inputs.action == 'run'
        run: |
          echo "Waiting 5 min for cloud-init + vLLM startup..."
          sleep 300

      - name: Run benchmark
        if: github.event_name != 'schedule' && github.event.inputs.action == 'run'
        run: |
          python3 cloud/oci/experiment/scripts/benchmark.py \
            "http://oci-exp-gpu:11434" \
            "${{ github.event.inputs.vllm_model }}" | tee /tmp/benchmark_results.json

      - name: Publish benchmark to summary
        if: github.event_name != 'schedule' && github.event.inputs.action == 'run'
        run: |
          echo "### GPU Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "**Model:** \`${{ github.event.inputs.vllm_model }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`json" >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/benchmark_results.json >> "$GITHUB_STEP_SUMMARY" || true
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform Destroy (always — GPU cannot be left running)
        if: always()
        working-directory: ${{ env.TF_DIR }}
        env: *tf_vars
        run: terraform destroy -auto-approve -input=false
