name: OCI AI Inference

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - deploy
          - destroy
      ollama_model:
        description: "Ollama model tag (leave blank for default: qwen3:8b)"
        required: false
        default: ""

permissions:
  contents: read

env:
  TF_VERSION: "1.15.1"
  TF_WORKING_DIR: cloud/oci/ai-inference/terraform
  ANSIBLE_WORKING_DIR: cloud/oci/ai-inference/ansible
  # OCI S3-compat backend
  TF_BACKEND_BUCKET: ${{ vars.OCI_STATE_BUCKET }}
  TF_BACKEND_KEY: "oci-ai-inference/terraform.tfstate"
  TF_BACKEND_REGION: ${{ vars.OCI_REGION }}
  TF_BACKEND_ENDPOINT: "https://${{ vars.OCI_STATE_NAMESPACE }}.compat.objectstorage.${{ vars.OCI_REGION }}.oraclecloud.com"

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'plan' }}
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Write OCI API private key
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Write SSH key for OCI instance
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/oci_inference
          chmod 600 ~/.ssh/oci_inference

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: |
          terraform init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="key=${TF_BACKEND_KEY}" \
            -backend-config="region=${TF_BACKEND_REGION}" \
            -backend-config="endpoints={s3=\"${TF_BACKEND_ENDPOINT}\"}" \
            -backend-config="access_key=${{ secrets.OCI_STATE_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.OCI_STATE_SECRET_KEY }}" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="use_path_style=true" \
            -backend-config="skip_s3_checksum=true"

      - name: Terraform Plan
        if: github.event.inputs.action != 'deploy'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_content: ${{ secrets.OCI_PRIVATE_KEY_CONTENT }}
          TF_VAR_region: ${{ vars.OCI_REGION }}
          TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
          TF_VAR_availability_domain: ${{ vars.OCI_AVAILABILITY_DOMAIN }}
          TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY_OCI }}
          TF_VAR_ollama_model: ${{ github.event.inputs.ollama_model || 'qwen3:8b' }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: terraform plan -out=tfplan -input=false

      - name: Upload plan artifact
        if: github.event.inputs.action != 'deploy'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

      - name: Terraform Apply
        if: >
          github.event.inputs.action == 'apply' &&
          github.ref == 'refs/heads/main'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_content: ${{ secrets.OCI_PRIVATE_KEY_CONTENT }}
          TF_VAR_region: ${{ vars.OCI_REGION }}
          TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
          TF_VAR_availability_domain: ${{ vars.OCI_AVAILABILITY_DOMAIN }}
          TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY_OCI }}
          TF_VAR_ollama_model: ${{ github.event.inputs.ollama_model || 'qwen3:8b' }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: |
          set +e
          # OCI Always-Free A1 capacity is often constrained — retry until available.
          for attempt in $(seq 1 20); do
            echo "Apply attempt $attempt/20..."
            terraform apply -auto-approve -input=false tfplan 2>&1 | tee /tmp/tf_apply.log
            exit_code=${PIPESTATUS[0]}
            if [ $exit_code -eq 0 ]; then
              echo "Apply succeeded."
              exit 0
            fi
            if grep -q "Out of host capacity" /tmp/tf_apply.log; then
              echo "Out of capacity — waiting 5 min before retry..."
              sleep 300
              terraform plan -out=tfplan -input=false
            else
              echo "Apply failed for non-capacity reason — aborting."
              exit 1
            fi
          done
          echo "All 20 attempts exhausted."
          exit 1

      - name: Install Tailscale (CI runner)
        if: >
          (github.event.inputs.action == 'apply' ||
           github.event.inputs.action == 'deploy') &&
          github.ref == 'refs/heads/main'
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY_CI }}
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --hostname=ci-oci-deploy
          sleep 5
          tailscale status

      - name: Install Ansible + collections
        if: >
          (github.event.inputs.action == 'apply' ||
           github.event.inputs.action == 'deploy') &&
          github.ref == 'refs/heads/main'
        run: |
          pip install ansible
          ansible-galaxy collection install community.general

      - name: Wait for OCI instance to join Tailscale
        if: >
          (github.event.inputs.action == 'apply' ||
           github.event.inputs.action == 'deploy') &&
          github.ref == 'refs/heads/main'
        run: |
          echo "Waiting for oci-ai-inference to appear online in Tailscale..."
          for i in $(seq 1 24); do
            if tailscale status --json 2>/dev/null | grep -q '"HostName":"oci-ai-inference"'; then
              echo "oci-ai-inference is online."
              exit 0
            fi
            echo "Attempt $i/24 — not yet online, waiting 30s..."
            sleep 30
          done
          echo "Timed out waiting for oci-ai-inference."
          exit 1

      - name: Run Ansible — configure Ollama
        if: >
          (github.event.inputs.action == 'apply' ||
           github.event.inputs.action == 'deploy') &&
          github.ref == 'refs/heads/main'
        working-directory: ${{ env.ANSIBLE_WORKING_DIR }}
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          OLLAMA_MODEL: ${{ github.event.inputs.ollama_model || 'qwen3:8b' }}
        run: |
          ansible-playbook playbooks/deploy_oci_ollama.yml \
            -i oci-ai-inference, \
            -e "ansible_user=ubuntu" \
            -e "ansible_ssh_private_key_file=~/.ssh/oci_inference" \
            -e "ansible_host=oci-ai-inference" \
            -e "ollama_model=${OLLAMA_MODEL}"

      - name: Terraform Destroy
        if: >
          github.event.inputs.action == 'destroy' &&
          github.ref == 'refs/heads/main'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_content: ${{ secrets.OCI_PRIVATE_KEY_CONTENT }}
          TF_VAR_region: ${{ vars.OCI_REGION }}
          TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
          TF_VAR_availability_domain: ${{ vars.OCI_AVAILABILITY_DOMAIN }}
          TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY_OCI }}
          TF_VAR_ollama_model: ${{ github.event.inputs.ollama_model || 'qwen3:8b' }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: terraform destroy -auto-approve -input=false
