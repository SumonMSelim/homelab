name: OCI Trial AI Inference

# Temporary workflow using OCI trial credits (expires ~2026-05-21).
# Uses paid A1.Flex shape (8 OCPU / 64 GB) which has capacity unlike Always-Free pool.
# Auto-destroy fires 2026-05-20 02:00 UTC — 1 day before trial end.
# State stored under separate key to avoid collision with free-tier workflow.

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
  schedule:
    # Auto-destroy 2026-05-20 02:00 UTC (1 day before trial expiry)
    - cron: "0 2 20 5 *"

permissions:
  contents: read

env:
  TF_VERSION: "1.15.1"
  TF_WORKING_DIR: cloud/oci/ai-inference/terraform
  TF_BACKEND_BUCKET: ${{ vars.OCI_STATE_BUCKET }}
  TF_BACKEND_KEY: "oci-trial-inference/terraform.tfstate"
  TF_BACKEND_REGION: ${{ vars.OCI_REGION }}
  TF_BACKEND_ENDPOINT: "https://${{ vars.OCI_STATE_NAMESPACE }}.compat.objectstorage.${{ vars.OCI_REGION }}.oraclecloud.com"

jobs:
  terraform:
    name: ${{ github.event_name == 'schedule' && 'Auto-destroy (trial expiry)' || format('Terraform {0}', github.event.inputs.action || 'plan') }}
    runs-on: ubuntu-24.04-arm
    if: >
      github.event_name == 'schedule' ||
      github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Write OCI API private key
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: |
          terraform init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="key=${TF_BACKEND_KEY}" \
            -backend-config="region=${TF_BACKEND_REGION}" \
            -backend-config="endpoints={s3=\"${TF_BACKEND_ENDPOINT}\"}" \
            -backend-config="access_key=${{ secrets.OCI_STATE_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.OCI_STATE_SECRET_KEY }}" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="use_path_style=true" \
            -backend-config="skip_s3_checksum=true"

      - name: Terraform Plan
        if: github.event_name != 'schedule'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_content: ${{ secrets.OCI_PRIVATE_KEY_CONTENT }}
          TF_VAR_region: ${{ vars.OCI_REGION }}
          TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
          TF_VAR_availability_domain: ${{ vars.OCI_AVAILABILITY_DOMAIN }}
          TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY_OCI }}
          TF_VAR_instance_display_name: oci-trial-inference
          TF_VAR_instance_shape: VM.Standard.A1.Flex
          TF_VAR_shape_ocpus: "8"
          TF_VAR_shape_memory_gbs: "64"
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: terraform plan -out=tfplan -input=false

      - name: Upload plan artifact
        if: github.event_name != 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-trial
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

      - name: Terraform Apply
        if: >
          github.event_name != 'schedule' &&
          github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_content: ${{ secrets.OCI_PRIVATE_KEY_CONTENT }}
          TF_VAR_region: ${{ vars.OCI_REGION }}
          TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
          TF_VAR_availability_domain: ${{ vars.OCI_AVAILABILITY_DOMAIN }}
          TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY_OCI }}
          TF_VAR_instance_display_name: oci-trial-inference
          TF_VAR_instance_shape: VM.Standard.A1.Flex
          TF_VAR_shape_ocpus: "8"
          TF_VAR_shape_memory_gbs: "64"
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: terraform apply -auto-approve -input=false tfplan

      - name: Terraform Destroy
        if: >
          github.event_name == 'schedule' ||
          github.event.inputs.action == 'destroy'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_content: ${{ secrets.OCI_PRIVATE_KEY_CONTENT }}
          TF_VAR_region: ${{ vars.OCI_REGION }}
          TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
          TF_VAR_availability_domain: ${{ vars.OCI_AVAILABILITY_DOMAIN }}
          TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY_OCI }}
          TF_VAR_instance_display_name: oci-trial-inference
          TF_VAR_instance_shape: VM.Standard.A1.Flex
          TF_VAR_shape_ocpus: "8"
          TF_VAR_shape_memory_gbs: "64"
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: terraform destroy -auto-approve -input=false

      - name: Summary
        if: github.event_name == 'schedule'
        run: |
          echo "### OCI Trial instance auto-destroyed" >> "$GITHUB_STEP_SUMMARY"
          echo "Triggered by schedule at $(date -u). Trial credits protected." >> "$GITHUB_STEP_SUMMARY"
